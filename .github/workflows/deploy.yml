name: Deploy with secrets

on:
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject API key
        env:
          FRED_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          sed -i "s/%%FRED_API_KEY%%/${FRED_KEY}/g" risk_dashboard2.html
          echo "Injection complete. Checking result:"
          grep -o "FRED_KEY = '.\{6\}" risk_dashboard2.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
